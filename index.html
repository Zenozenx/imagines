<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Homepage Pribadi</title>
    <style>
        /* Reset semua margin dan padding, hilangkan scrollbar jika tidak perlu */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Menghilangkan scrollbar karena background fullscreen */
        }

        body {
            /* Menggunakan GIF sebagai background */
            background-image: url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExb3lmdGFvbWM1cWhrZXU5bTJ6d3NvY3kzcWtqb3lpd2gxdzZ0MXUzciZlcD12MV9naWZzX3NlYXJjaCZjdD1n/HkFkuxrcSjeAhszTpS/giphy.gif');
            background-size: cover;      /* Menutupi seluruh area */
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* Efek parallax ringan, membuat background tetap saat scroll (meskipun scroll dinonaktifkan) */
        }

        /* Tidak ada konten apapun, halaman benar-benar kosong */
    </style>
</head>
<body>
    <!-- Tanpa elemen apapun, halaman sepenuhnya kosong -->
</body>
</html>
